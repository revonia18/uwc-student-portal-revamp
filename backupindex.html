<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UWC Student Portal Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">


</head>
<body>
<div class="containers">
<div class="Slideshow" >

    <div class="slide_wrapper">
        
        <div class="slide"><img src="UWC logo.png"></div>

        <div class="slide"><img src="Center.jpg"></div>

        <div class="slide"> <img src="Hall.jpg"></div>

        <div class="slide"><img src="UWC-Great-Hall-thumbnail.webp"></div>


    </div>
</div>

<div class="Login" >
        <header>
        <div class="img">
        <img src="UWC_logo.png" alt="UWC logo" width="150" height="150">
        <h1 class="form-title">Sign in to your <br>student account</h1>
        </header>
        
       
        <div class="container" id="signIn">
        <form>

            <div class="input-group">
                <label for="Student_Number">Student Number</label><br>
                <input type="text" name="Student_Number" id="Student_Number" placeholder="Enter Your Student number" required>
                </div>

            <div class="input-group">
                 <i class="fas fa-lock"></i>
                 <label for="password">Password</label><br>
                <input type="password" name="password" id="signInPassword" placeholder="Enter Your Password" required>
                </div>

            <p class="recover">
                <a href="#">Recover Password</a>
            </p>


            <input type="submit" class="btn" name="signIn" value="Sign In">
            <center><p>After logging in for the first time you are encouraged to change your password by clicking on the Change/Forgot Password link at the top of this page.
All other users your Password will be your VPN/iKamva password.</p>
            </center>
        </form>
        </div>
    </div>
</div>


</body>

</html>
